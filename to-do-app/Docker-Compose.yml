services:
  todo-app-server:
    build:
      context: ./server_api
      dockerfile: Dockerfile
    environment:
      - HOST=0.0.0.0
      - DB_FILE_PATH=/app/data/db.json
    ports:
      - "${TODO_APP_SERVER_PORT:-8081}:8080"
    depends_on:
      - todo_database
    volumes:
      - todo-data:/app/data
      - ./server_api/keys/:/app/keys:ro
    restart: always

  echo-service-api:
    build:
      context: ../echo-server
      dockerfile: Dockerfile_Echo
    ports:
      - "${ECHO_SERVICE_PORT:-8088}:8888"
    restart: always

  todo-client-nginx:
    build:
      context: .
      dockerfile: Dockerfile_Nginx
    ports:
      - "${TODO_CLIENT_PORT:-8080}:80"

  identity-provider:
    build:
      context: ../identity-provider-wip
      dockerfile: idp/Dockerfile
    ports:
      - "${IDENTITY_PROVIDER_PORT:-8090}:8080"
    environment:
      - HOST=${IDP_HOST:-0.0.0.0}
      - PORT=${IDP_PORT:-8080}
      - CORS_ORIGIN=${IDP_CORS_ORIGIN:-http://localhost:8080,http://localhost:8081}
      - DB_HOST=${IDP_DB_HOST:-todo_postgres}
      - DB_PORT=${IDP_DB_PORT:-5432}
      - DB_USER=${IDP_DB_USER:?IDP_DB_USER_required}
      - DB_PASSWORD=${IDP_DB_PASSWORD:?IDP_DB_PASSWORD_required}
      - DB_JDBC_STRING=${IDP_DB_JDBC_STRING:-jdbc:postgresql://todo_postgres:5432/idp}
    depends_on:
      - todo_postgres
    restart: always

  todo_postgres:
    image: postgres:17-alpine3.22
    environment:
      POSTGRES_USER: ${IDP_DB_USER:?IDP_DB_USER_required}
      POSTGRES_PASSWORD: ${IDP_DB_PASSWORD:?IDP_DB_PASSWORD_required}
    ports:
      - "${TODO_POSTGRES_HOST_PORT:-8999}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../identity-provider-wip/idp/init/initial_schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always

  todo_database:
    image: mariadb:latest
    environment:
       MARIADB_ROOT_PASSWORD: ${TODO_DB_ROOT_PASSWORD:?TODO_DB_ROOT_PASSWORD_required}
       MARIADB_DATABASE: ${TODO_DB_NAME:-todo}
       MARIADB_USER: ${TODO_DB_USER:?TODO_DB_USER_required}
       MARIADB_PASSWORD: ${TODO_DB_PASSWORD:?TODO_DB_PASSWORD_required}
    ports:
      - "${TODO_DB_HOST_PORT:-3307}:3306"
    volumes:
      - todo_db_data:/var/lib/mysql
      - ./server_api/src/init:/docker-entrypoint-initdb.d
  adminer:
    image: adminer
    ports:
    - "${ADMINER_PORT:-8083}:8080"

volumes:
  todo-data:
  todo_db_data:
  postgres_data:
