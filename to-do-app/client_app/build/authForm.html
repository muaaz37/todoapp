<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - To-Do App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/node_modules/@fortawesome/fontawesome-free/css/all.min.css" />
  <script defer type="module" src="/js/auth/authForm.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
  <h1 class="text-4xl font-bold text-blue-600 text-center mb-2">To-Do Login</h1>
  <p class="text-center text-gray-500 mb-6">Sign in to manage your tasks</p>

  <form class="space-y-5">
    <div>
      <label for="email" class="block text-gray-700 mb-1">Email Address</label>
      <input
        type="email"
        id="email"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="you@example.com"
        required
      />
    </div>
    <div>
      <label for="password" class="block text-gray-700 mb-1">Password</label>
      <input
        type="password"
        id="password"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="••••••••"
        required
      />
    </div>
    <button
      type="submit"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition"
    >
      Login
    </button>
  </form>
</div>
</body>
</html>
